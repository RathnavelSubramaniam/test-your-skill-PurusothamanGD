name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Calculator
      id: calculator
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: Calculator
        setup-command: javac Calculator.java
        command: java Calculator
        input: 10 20
        expected-output: '30'
        comparison-method: exact
        timeout: 10
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        CALCULATOR_RESULTS: "${{steps.calculator.outputs.result}}"
      with:
        runners: calculator
